<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Kartičky – SK Slovan Kunratice</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root { --purple:#5B3FA0; --purple-dark:#3d2a6e; --purple-light:#e8e0f5; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Barlow',sans-serif; background:#ddd; padding:30px 20px; }

  #editor { background:white; border-radius:16px; padding:28px 36px; max-width:680px; margin:0 auto 40px; box-shadow:0 4px 24px rgba(91,63,160,.12); }
  #editor h1 { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:24px; color:var(--purple-dark); margin-bottom:4px; }
  #editor p.sub { color:#555; font-size:13px; margin-bottom:20px; }
  #editor label { display:block; font-size:12px; font-weight:600; color:var(--purple-dark); margin-bottom:5px; text-transform:uppercase; letter-spacing:.05em; }
  #editor textarea { width:100%; min-height:120px; border:2px solid var(--purple-light); border-radius:10px; padding:12px 14px; font-family:'Barlow',sans-serif; font-size:15px; color:#333; resize:vertical; outline:none; }
  #editor input[type="text"] { width:100%; border:2px solid var(--purple-light); border-radius:10px; padding:10px 13px; font-family:'Barlow',sans-serif; font-size:14px; color:#333; outline:none; margin-bottom:14px; }
  .btn-row { display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; }
  button.primary { background:var(--purple); color:white; border:none; border-radius:10px; padding:12px 26px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.06em; cursor:pointer; }
  button.primary:hover { background:var(--purple-dark); }
  button.secondary { background:transparent; color:var(--purple); border:2px solid var(--purple-light); border-radius:10px; padding:10px 20px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  #count-info { font-size:13px; color:#555; margin-top:8px; }
  #progress { font-size:13px; color:var(--purple); margin-top:6px; display:none; font-weight:600; }

  #karticky { max-width:960px; margin:0 auto; display:flex; flex-wrap:wrap; gap:24px; justify-content:center; }

  /* A6 = 148x105mm @ 96dpi = 559x397px — BEZ border-radius */
  .karta {
    width:559px;
    height:397px;
    background:white;
    box-shadow:0 4px 20px rgba(0,0,0,.15);
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    flex-shrink:0;
  }

  .karta-header {
    background:var(--purple);
    padding:13px 18px 11px;
    display:flex;
    align-items:center;
    gap:13px;
    flex-shrink:0;
  }
  .karta-logo { width:58px; height:58px; object-fit:contain; flex-shrink:0; }
  .karta-header-text { flex:1; }
  .karta-club  { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:22px; letter-spacing:.1em; color:white; text-transform:uppercase; line-height:1.2; }
  .karta-title { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:16px; letter-spacing:.07em; color:rgba(255,255,255,.85); text-transform:uppercase; margin-top:2px; }

  .karta-name {
    padding:10px 18px 8px;
    border-bottom:2px solid var(--purple-light);
    flex-shrink:0;
  }
  .karta-name-label { font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#aaa; margin-bottom:3px; }
  .karta-name-value { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:36px; color:var(--purple-dark); letter-spacing:-.01em; line-height:1; }

  .karta-body {
    flex:1;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:1fr 1fr;
    gap:6px;
    padding:10px 18px 12px;
  }

  .disciplina { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }

  .punch-circle {
    width:52px; height:52px;
    border-radius:50%;
    border:2px solid var(--purple-light);
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .punch-circle img { width:32px; height:32px; opacity:.45; object-fit:contain; display:block; }

  .disciplina-num { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; color:#bbb; letter-spacing:.06em; }

  @media print {
    body { background:white; padding:0; }
    #editor { display:none; }
    #karticky { gap:4mm; padding:6mm; justify-content:flex-start; }
    .karta { width:148mm; height:105mm; box-shadow:none; border:0.5px solid #ccc; page-break-inside:avoid; }
  }
</style>
</head>
<body>

<div id="editor">
  <h1>Generátor kartiček</h1>
  <p class="sub">SK Slovan Kunratice · Dokopná</p>
  <label>Kategorie</label>
  <input type="text" id="kategorie" value="Mladší přípravka">
  <label>Jména hráčů (každé na nový řádek)</label>
  <textarea id="names" placeholder="Jan Novák&#10;Tomáš Procházka&#10;Adam Blohon&#10;..."></textarea>
  <div class="btn-row">
    <button class="primary" onclick="generate()">Vygenerovat kartičky</button>
    <button class="secondary" id="btnDownload" onclick="downloadAll()" disabled>⬇ Stáhnout vše jako JPG</button>
    <button class="secondary" onclick="window.print()">🖨 Tisknout vše</button>
  </div>
  <div id="progress"></div>
  <div id="count-info"></div>
</div>

<div id="karticky"></div>

<script>
var LOGO_SRC = "logo.png";
var BALL_SRC = "ball.png";
var generatedNames = [];

function sanitize(str) { return str.replace(/[^a-z0-9]/gi, "_"); }

function generate() {
  var raw = document.getElementById("names").value;
  var kategorie = document.getElementById("kategorie").value || "Mladší přípravka";
  var names = raw.split("\n").map(function(n){ return n.trim(); }).filter(function(n){ return n.length > 0; });
  var container = document.getElementById("karticky");
  container.innerHTML = "";
  generatedNames = [];
  document.getElementById("btnDownload").disabled = true;
  if (!names.length) { document.getElementById("count-info").textContent = "Zadej alespoň jedno jméno."; return; }

  for (var i = 0; i < names.length; i++) {
    var name = names[i];
    generatedNames.push(name);
    var k = document.createElement("div");
    k.className = "karta";

    var disciplines = "";
    for (var d = 1; d <= 8; d++) {
      disciplines +=
        "<div class=\"disciplina\">" +
          "<div class=\"punch-circle\"><img src=\"" + BALL_SRC + "\" alt=\"\"></div>" +
          "<div class=\"disciplina-num\">" + d + "</div>" +
        "</div>";
    }

    k.innerHTML =
      "<div class=\"karta-header\">" +
        "<img class=\"karta-logo\" src=\"" + LOGO_SRC + "\" alt=\"logo\">" +
        "<div class=\"karta-header-text\">" +
          "<div class=\"karta-club\">SK Slovan Kunratice</div>" +
          "<div class=\"karta-title\">Dokopná 2025/2026 · " + kategorie + "</div>" +
        "</div>" +
      "</div>" +
      "<div class=\"karta-name\">" +
        "<div class=\"karta-name-label\">Hráč</div>" +
        "<div class=\"karta-name-value\">" + name + "</div>" +
      "</div>" +
      "<div class=\"karta-body\">" + disciplines + "</div>";

    container.appendChild(k);
  }

  document.getElementById("count-info").textContent = "✓ Vygenerováno " + names.length + " kartiček";
  document.getElementById("btnDownload").disabled = false;
  container.scrollIntoView({ behavior: "smooth" });
}

function loadImage(src) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = function(){ resolve(img); };
    img.onerror = function() {
      var img2 = new Image();
      img2.onload = function(){ resolve(img2); };
      img2.onerror = function(){ resolve(null); };
      img2.src = src + "?t=" + Date.now();
    };
    img.src = src;
  });
}

async function downloadAll() {
  var karty = document.querySelectorAll(".karta");
  if (!karty.length) return;
  var btn = document.getElementById("btnDownload");
  var progress = document.getElementById("progress");
  btn.disabled = true;
  progress.style.display = "block";

  var logoImage = await loadImage(LOGO_SRC);

  for (var i = 0; i < karty.length; i++) {
    var name = generatedNames[i] || ("karta_" + (i+1));
    progress.textContent = "Exportuji " + (i+1) + " / " + karty.length + " — " + name + "...";
    await new Promise(function(r){ setTimeout(r, 50); });

    var logoEl = karty[i].querySelector(".karta-logo");
    logoEl.style.visibility = "hidden";

    var baseCanvas = await html2canvas(karty[i], {
      scale: 2,
      useCORS: true,
      allowTaint: false,
      backgroundColor: "#ffffff",
      width: 559,
      height: 397,
      scrollX: 0,
      scrollY: -window.scrollY,
      windowWidth: document.documentElement.scrollWidth,
      windowHeight: document.documentElement.scrollHeight,
      logging: false
    });

    logoEl.style.visibility = "visible";

    var W = 559 * 2, H = 397 * 2;
    var final = document.createElement("canvas");
    final.width = W; final.height = H;
    var ctx = final.getContext("2d");
    ctx.drawImage(baseCanvas, 0, 0);

    if (logoImage) {
      var maxS = 58 * 2;
      var lw = logoImage.naturalWidth, lh = logoImage.naturalHeight;
      var ratio = Math.min(maxS / lw, maxS / lh);
      var dw = lw * ratio, dh = lh * ratio;
      var dx = 18*2 + (maxS - dw) / 2;
      var dy = 13*2 + (maxS - dh) / 2;
      ctx.drawImage(logoImage, dx, dy, dw, dh);
    }

    await new Promise(function(resolve) {
      final.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.download = "karta_" + sanitize(name) + ".jpg";
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function(){ URL.revokeObjectURL(url); resolve(); }, 300);
      }, "image/jpeg", 0.95);
    });
    await new Promise(function(r){ setTimeout(r, 200); });
  }

  progress.textContent = "✓ Hotovo — staženo " + karty.length + " JPG souborů.";
  btn.disabled = false;
}
</script>
</body>
</html>
