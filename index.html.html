<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Diplomy – SK Slovan Kunratice</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root { --purple:#5B3FA0; --purple-dark:#3d2a6e; --purple-light:#e8e0f5; --grey:#555; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Barlow',sans-serif; background:#ddd; padding:40px 20px; }

  #editor { background:white; border-radius:16px; padding:32px 40px; max-width:680px; margin:0 auto 48px; box-shadow:0 4px 24px rgba(91,63,160,.12); }
  #editor h1 { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:26px; color:var(--purple-dark); margin-bottom:4px; }
  #editor p.sub { color:var(--grey); font-size:13px; margin-bottom:22px; }
  #editor label { display:block; font-size:12px; font-weight:600; color:var(--purple-dark); margin-bottom:5px; text-transform:uppercase; letter-spacing:.05em; }
  #editor textarea { width:100%; min-height:140px; border:2px solid var(--purple-light); border-radius:10px; padding:12px 14px; font-family:'Barlow',sans-serif; font-size:15px; color:#333; resize:vertical; outline:none; transition:border-color .2s; }
  #editor textarea:focus { border-color:var(--purple); }
  .row { display:flex; gap:14px; margin-top:14px; }
  .row > div { flex:1; }
  #editor input[type="text"] { width:100%; border:2px solid var(--purple-light); border-radius:10px; padding:10px 13px; font-family:'Barlow',sans-serif; font-size:14px; color:#333; outline:none; transition:border-color .2s; }
  #editor input[type="text"]:focus { border-color:var(--purple); }
  .btn-row { display:flex; gap:12px; margin-top:24px; flex-wrap:wrap; }
  button.primary { background:var(--purple); color:white; border:none; border-radius:10px; padding:13px 28px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:17px; letter-spacing:.06em; cursor:pointer; transition:background .2s; }
  button.primary:hover { background:var(--purple-dark); }
  button.secondary { background:transparent; color:var(--purple); border:2px solid var(--purple-light); border-radius:10px; padding:11px 22px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.06em; cursor:pointer; transition:border-color .2s; }
  button.secondary:hover { border-color:var(--purple); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  #count-info { font-size:13px; color:var(--grey); margin-top:10px; }
  #progress { font-size:13px; color:var(--purple); margin-top:8px; display:none; }
  .note { font-size:12px; color:#e07000; margin-top:10px; }

  #diplomy { max-width:860px; margin:0 auto; }
  .diploma-wrap { margin-bottom:40px; display:flex; flex-direction:column; align-items:center; }
  .diploma-label { font-size:12px; color:#888; margin-bottom:8px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; }

  .diploma { width:794px; height:1123px; position:relative; overflow:hidden; background:white; box-shadow:0 8px 40px rgba(0,0,0,.2); }
  .d-bg   { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .d-logo { position:absolute; top:28px; right:34px; width:140px; height:140px; object-fit:contain; }

  .d-title    { position:absolute; top:150px; left:54px; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:158px; line-height:1; color:var(--purple); letter-spacing:.08em; }
  .d-subtitle { position:absolute; top:358px; left:58px; font-family:'Barlow',sans-serif; font-weight:600; font-size:29px; color:#444; letter-spacing:.06em; text-transform:uppercase; }
  .d-divider  { position:absolute; top:406px; left:58px; width:56px; height:3px; background:var(--purple); border-radius:2px; }
  .d-name-block { position:absolute; top:436px; left:54px; right:54px; }
  .d-first, .d-last, .d-full { display:block; font-family:'Barlow Condensed',sans-serif; font-weight:900; line-height:.93; letter-spacing:-.01em; word-break:break-word; font-size:172px; color:var(--purple-dark); }

  .d-footer { position:absolute; bottom:36px; left:54px; }
  .d-footer-bar   { width:44px; height:3px; background:var(--purple); border-radius:2px; margin-bottom:10px; }
  .d-footer-line1 { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; letter-spacing:.18em; color:#555; text-transform:uppercase; line-height:1.6; }
  .d-footer-line2 { font-family:'Barlow Condensed',sans-serif; font-weight:500; font-size:17px; letter-spacing:.14em; color:#888; text-transform:uppercase; line-height:1.4; }

  @media print {
    body { background:white; padding:0; }
    #editor { display:none; }
    .diploma-wrap { page-break-after:always; margin:0; display:block; }
    .diploma-label { display:none; }
    .diploma { width:210mm; height:297mm; box-shadow:none; }
    .d-title    { font-size:132px; top:126px; }
    .d-subtitle { font-size:24px;  top:302px; }
    .d-divider  { top:342px; }
    .d-name-block { top:368px; }
    .d-first, .d-last, .d-full { font-size:144px; }
    .d-footer { bottom:28px; }
  }
</style>
</head>
<body>

<div id="editor">
  <h1>Generátor diplomů</h1>
  <p class="sub">SK Slovan Kunratice · Mladší přípravka · 2025/2026</p>

  <label>Jména hráčů (každé na nový řádek)</label>
  <textarea id="names" placeholder="Jan Novák&#10;Tomáš Procházka&#10;Adam Blohon&#10;..."></textarea>

  <div class="row">
    <div><label>Kategorie</label><input type="text" id="kategorie" value="Mladší přípravka"></div>
    <div><label>Sezóna</label><input type="text" id="sezona" value="2025/2026"></div>
  </div>

  <div class="btn-row">
    <button class="primary" onclick="generate()">Vygenerovat diplomy</button>
    <button class="secondary" id="btnDownload" onclick="downloadAll()" disabled>⬇ Stáhnout vše jako JPG</button>
  </div>

  <div id="progress"></div>
  <div id="count-info"></div>
</div>

<div id="diplomy"></div>

<script>
var LOGO_SRC = "logo.png";
var BG_SRC   = "BG1.png";
var generatedNames = [];

function sanitize(str) {
  return str.replace(/[^a-zA-Z0-9_\-]/g, "_");
}

function generate() {
  var raw = document.getElementById("names").value;
  var kategorie = document.getElementById("kategorie").value || "Mladší přípravka";
  var sezona    = document.getElementById("sezona").value    || "2025/2026";
  var names = raw.split("\n").map(function(n){ return n.trim(); }).filter(function(n){ return n.length > 0; });
  var container = document.getElementById("diplomy");
  container.innerHTML = "";
  generatedNames = [];
  document.getElementById("btnDownload").disabled = true;

  if (!names.length) {
    document.getElementById("count-info").textContent = "Zadej alespoň jedno jméno.";
    return;
  }

  for (var i = 0; i < names.length; i++) {
    var name = names[i];
    generatedNames.push(name);
    var wrap = document.createElement("div"); wrap.className = "diploma-wrap";
    var lbl  = document.createElement("div"); lbl.className  = "diploma-label";
    lbl.textContent = "Diplom " + (i+1) + " / " + names.length + " — " + name;
    var d = document.createElement("div"); d.className = "diploma";
    var parts = name.trim().split(" ");
    var nameHTML;
    if (parts.length >= 2) {
      var prijmeni = parts.pop();
      var jmeno    = parts.join(" ");
      nameHTML = "<span class=\"d-first\">" + jmeno + "</span><span class=\"d-last\">" + prijmeni + "</span>";
    } else {
      nameHTML = "<span class=\"d-full\">" + name + "</span>";
    }
    d.innerHTML =
      "<img class=\"d-bg\"   src=\"" + BG_SRC   + "\" alt=\"\">" +
      "<img class=\"d-logo\" src=\"" + LOGO_SRC + "\" alt=\"SK Slovan Kunratice\">" +
      "<div class=\"d-title\">DIPLOM</div>" +
      "<div class=\"d-subtitle\">ZA SKVĚLOU SEZÓNU " + sezona + "</div>" +
      "<div class=\"d-divider\"></div>" +
      "<div class=\"d-name-block\">" + nameHTML + "</div>" +
      "<div class=\"d-footer\">" +
        "<div class=\"d-footer-bar\"></div>" +
        "<div class=\"d-footer-line1\">" + kategorie + "</div>" +
        "<div class=\"d-footer-line2\">SK Slovan Kunratice</div>" +
      "</div>";
    wrap.appendChild(lbl);
    wrap.appendChild(d);
    container.appendChild(wrap);
  }

  document.getElementById("count-info").textContent = "✓ Vygenerováno " + names.length + " diplomů";
  document.getElementById("btnDownload").disabled = false;
  container.scrollIntoView({ behavior: "smooth" });
}

async function downloadAll() {
  var diplomas = document.querySelectorAll(".diploma");
  if (!diplomas.length) return;

  var btn = document.getElementById("btnDownload");
  var progress = document.getElementById("progress");
  btn.disabled = true;
  progress.style.display = "block";

  for (var i = 0; i < diplomas.length; i++) {
    var name = generatedNames[i] || ("diplom_" + (i+1));
    progress.textContent = "Exportuji " + (i+1) + " / " + diplomas.length + " — " + name + "...";

    var canvas = await html2canvas(diplomas[i], {
      scale: 2,
      useCORS: true,
      allowTaint: false,
      backgroundColor: "#ffffff",
      width: 794,
      height: 1123,
      logging: false
    });

    await new Promise(function(resolve) {
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.download = "diplom_" + sanitize(name) + ".jpg";
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function(){ URL.revokeObjectURL(url); resolve(); }, 300);
      }, "image/jpeg", 0.95);
    });
    await new Promise(function(r){ setTimeout(r, 200); });
  }

  progress.textContent = "✓ Hotovo! Staženo " + diplomas.length + " JPG souborů.";
  btn.disabled = false;
}
</script>
</body>
</html>
